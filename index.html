<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro-Local Knowledge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <div class="header">THE NEW SCHOOL CAMPUS</div>

    <!-- HOME -->
    <div class="screen active" id="homeScreen">
      <div class="mascot-guide">
        <img src="mascot.png" alt="Mascot" />
        <div class="bubble">Tap a building to explore live campus notes.</div>
      </div>

      <div class="map">
        <div class="hotspot copa-zone" onclick="openBuilding('copa')"></div>
        <div class="hotspot lang-zone" onclick="openBuilding('lang')"></div>
        <div class="hotspot uc-zone" onclick="openBuilding('uc')"></div>
        <div class="hotspot nssr-zone" onclick="openBuilding('nssr')"></div>
        <div class="hotspot parsons-zone" onclick="openBuilding('parsons')"></div>
        <div id="tips-container"></div>
      </div>

      <div class="filters">
        <button class="filter f-all" onclick="filterTips('all')">All</button>
        <button class="filter f-lang" onclick="filterTips('lang')">Lang</button>
        <button class="filter f-parsons" onclick="filterTips('parsons')">Parsons</button>
        <button class="filter f-uc" onclick="filterTips('uc')">UC</button>
        <button class="filter f-copa" onclick="filterTips('copa')">CoPA</button>
        <button class="filter f-nssr" onclick="filterTips('nssr')">NSSR</button>
      </div>
    </div>

    <!-- BUILDING -->
    <div class="screen building" id="buildingScreen">
      <button class="back-btn" onclick="showHome()">← Back</button>
      <div id="buildingTitle" class="building-title"></div>
      <div id="floorList"></div>
      <div id="arena-content"></div>
    </div>

    <!-- LIVE -->
    <div class="screen feed" id="feedScreen">
      <div id="feed-list"></div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
      <h3>Post a campus note</h3>
      <input id="tipText" placeholder="Share something useful…" />
      <select id="tipSchool">
        <option value="uc">UC</option>
        <option value="lang">Lang</option>
        <option value="parsons">Parsons</option>
        <option value="copa">CoPA</option>
        <option value="nssr">NSSR</option>
      </select>
      <button onclick="addTip()">Post</button>
    </div>

    <div class="nav">
      <div onclick="showHome()">Map</div>
      <div onclick="openModal()">＋</div>
      <div onclick="showFeed()">Live</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
